<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Banking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span>Welcome, <strong th:text="${user.firstName}"></strong></span>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline">Logout</button>
    </form>
</nav>

<div class="container">

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Accounts -->
    <div class="section-header">
        <h2>My Accounts</h2>
        <a th:href="@{/accounts/open}" class="btn">+ Open Account</a>
    </div>

    <div th:if="${accounts.empty}" class="empty-state">
        You have no accounts yet. <a th:href="@{/accounts/open}">Open one now</a>.
    </div>

    <div th:each="account : ${accounts}" class="card">
        <div class="card-header">
            <span class="account-type" th:text="${#strings.replace(account.accountType.name(), '_', ' ')}"></span>
            <span class="badge" th:text="${account.status}"></span>
        </div>
        <p class="balance" th:text="${'$' + #numbers.formatDecimal(account.balance, 1, 2)}"></p>
        <p class="account-id">ID: <code th:text="${account.id}"></code></p>

        <div class="card-actions">
            <!-- Deposit -->
            <form th:action="@{/accounts/{id}/deposit(id=${account.id})}" method="post" class="inline-form">
                <input type="number" name="amount" placeholder="Amount" min="0.01" step="0.01" required>
                <button type="submit" class="btn btn-success">Deposit</button>
            </form>

            <!-- Withdraw -->
            <form th:action="@{/accounts/{id}/withdraw(id=${account.id})}" method="post" class="inline-form">
                <input type="number" name="amount" placeholder="Amount" min="0.01" step="0.01" required>
                <button type="submit" class="btn btn-danger">Withdraw</button>
            </form>
        </div>
    </div>

    <!-- Transfer -->
    <div th:if="${accounts.size() gt 1}" class="card">
        <h3>Transfer Between Accounts</h3>
        <form th:action="@{/accounts/transfer}" method="post">
            <div class="form-group">
                <label>From Account</label>
                <select name="fromAccountId" required>
                    <option th:each="account : ${accounts}"
                            th:value="${account.id}"
                            th:text="${#strings.replace(account.accountType.name(), '_', ' ') + ' - $' + #numbers.formatDecimal(account.balance, 1, 2)}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>To Account</label>
                <select name="toAccountId" required>
                    <option th:each="account : ${accounts}"
                            th:value="${account.id}"
                            th:text="${#strings.replace(account.accountType.name(), '_', ' ') + ' - $' + #numbers.formatDecimal(account.balance, 1, 2)}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" name="amount" placeholder="Amount" min="0.01" step="0.01" required>
            </div>
            <button type="submit" class="btn">Transfer</button>
        </form>
    </div>

    <!-- Recent Transactions -->
    <h2>Recent Transactions</h2>

    <div th:if="${recentTransactions.empty}" class="empty-state">
        No transactions yet.
    </div>

    <table th:if="${!recentTransactions.empty}" class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
                <th>From</th>
                <th>To</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tx : ${recentTransactions}">
                <td th:text="${#temporals.format(tx.date, 'dd MMM yyyy HH:mm')}"></td>
                <td th:text="${tx.type}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(tx.amount, 1, 2)}"></td>
                <td th:text="${tx.fromBankAccount != null ? tx.fromBankAccount.id : '-'}"></td>
                <td th:text="${tx.toBankAccount != null ? tx.toBankAccount.id : '-'}"></td>
                <td th:text="${tx.status}"></td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
